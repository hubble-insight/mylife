<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源库 - MyLife</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
        }

        #sidebar {
            width: 280px;
            background: #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.05);
        }

        #sidebar .sidebar-header {
            padding: 1.5rem;
            text-align: center;
            background: var(--primary-gradient);
            color: #fff;
        }

        #sidebar .sidebar-header h3 {
            margin: 0;
            font-weight: 700;
        }

        #sidebar .list-unstyled {
            padding: 1rem;
        }

        #sidebar .list-unstyled .nav-item {
            margin-bottom: 0.5rem;
        }

        #sidebar .list-unstyled a {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            color: #555;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.3s;
        }

        #sidebar .list-unstyled a:hover {
            background: #f0f2f5;
            color: #667eea;
            text-decoration: none;
        }

        #sidebar .list-unstyled a.active {
            background: var(--primary-gradient);
            color: #fff;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        #sidebar .list-unstyled i {
            margin-right: 0.75rem;
            font-size: 1.2rem;
        }
        
        #sidebar .nav-category {
            padding: 0.5rem 1rem;
            color: #999;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
        }

        #content {
            flex-grow: 1;
            padding: 2rem;
            overflow-y: auto;
        }
        .card-file {
            cursor: pointer;
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
            border: 1px solid #e9ecef;
            border-radius: .75rem;
            overflow: hidden;
        }
        .card-file:hover {
            transform: translateY(-5px);
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
        }
        .card-img-top-container {
            position: relative;
            width: 100%;
            padding-top: 75%; /* 4:3 aspect ratio */
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .card-img-top-container .card-img-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-icon-display {
            font-size: 4rem;
            color: #adb5bd;
        }
        .play-icon-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.85);
            text-shadow: 0 0 15px rgba(0,0,0,0.6);
            transition: color .2s ease;
        }
        .card-file:hover .play-icon-overlay {
            color: rgba(255, 255, 255, 1);
        }
        .card-file .card-body {
            padding: 0.75rem;
        }
        .card-file .card-title {
            margin-bottom: 0;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .card-file .card-footer {
            background: none;
            border-top: 1px solid #e9ecef;
            padding: 0.5rem 0.75rem;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-header">
            <h3><i class="bi bi-house-heart-fill"></i> MyLife</h3>
        </div>
        <ul class="list-unstyled components">
             <li class="nav-item">
                <a class="nav-link" th:href="@{/home}">
                    <i class="bi bi-speedometer2"></i> 首页
                </a>
            </li>
            <li class="nav-category">个人动态</li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/weibo}">
                    <i class="bi bi-weibo"></i> 微博动态
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/github}">
                    <i class="bi bi-github"></i> GitHub
                </a>
            </li>
            <li class="nav-category">个人数据</li>
            <li class="nav-item">
                <a class="nav-link active" th:href="@{/resources}">
                    <i class="bi bi-cloud"></i> 资源库
                </a>
            </li>
        </ul>
    </div>

    <div id="content">
        <main class="container-fluid">
            <div class="row">
                <aside class="col-lg-3">
                    <div class="sticky-top" style="top: 2rem;">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h4 class="mb-0">分类</h4>
                            <a th:href="@{/resources(sync=true)}" class="btn btn-sm btn-outline-primary" title="同步资源">
                                <i class="bi bi-arrow-repeat"></i> 同步
                            </a>
                        </div>
                        <div class="list-group shadow-sm">
                        <a th:href="@{/resources(type='all')}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" th:classappend="${currentType == 'all'} ? 'active'">
                            <div><i class="bi bi-grid-fill me-2"></i>全部</div>
                            <span class="badge" th:classappend="${currentType == 'all'} ? 'bg-light text-primary' : 'bg-secondary'" th:text="${fileCounts.get(T(com.mylife.model.FileType).DOCUMENT) + fileCounts.get(T(com.mylife.model.FileType).VIDEO) + fileCounts.get(T(com.mylife.model.FileType).AUDIO) + fileCounts.get(T(com.mylife.model.FileType).IMAGE)}"></span>
                        </a>
                        <a th:href="@{/resources(type='image')}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" th:classappend="${currentType == 'image'} ? 'active'">
                            <div><i class="bi bi-image-fill me-2"></i>图片</div>
                            <span class="badge" th:classappend="${currentType == 'image'} ? 'bg-light text-primary' : 'bg-primary'" th:text="${fileCounts.get(T(com.mylife.model.FileType).IMAGE)}"></span>
                        </a>
                        <a th:href="@{/resources(type='video')}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" th:classappend="${currentType == 'video'} ? 'active'">
                            <div><i class="bi bi-film me-2"></i>视频</div>
                            <span class="badge" th:classappend="${currentType == 'video'} ? 'bg-light text-primary' : 'bg-warning text-dark'" th:text="${fileCounts.get(T(com.mylife.model.FileType).VIDEO)}"></span>
                        </a>
                        <a th:href="@{/resources(type='audio')}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" th:classappend="${currentType == 'audio'} ? 'active'">
                            <div><i class="bi bi-music-note-beamed me-2"></i>音频</div>
                             <span class="badge" th:classappend="${currentType == 'audio'} ? 'bg-light text-primary' : 'bg-info text-dark'" th:text="${fileCounts.get(T(com.mylife.model.FileType).AUDIO)}"></span>
                        </a>
                        <a th:href="@{/resources(type='document')}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" th:classappend="${currentType == 'document'} ? 'active'">
                            <div><i class="bi bi-file-earmark-text-fill me-2"></i>文档</div>
                            <span class="badge" th:classappend="${currentType == 'document'} ? 'bg-light text-primary' : 'bg-success'" th:text="${fileCounts.get(T(com.mylife.model.FileType).DOCUMENT)}"></span>
                        </a>
                    </div>
                    </div>
                </aside>

            <!-- Files Grid -->
            <section class="col-lg-9">
                <div th:if="${#lists.isEmpty(files)}" class="text-center py-5" style="margin-top: 20%;">
                    <i class="bi bi-cloud-slash display-1 text-muted"></i>
                    <h4 class="mt-3 text-muted">空空如也</h4>
                    <p class="text-muted">请点击侧边栏的“同步”按钮来获取百度网盘资源</p>
                </div>

                <div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 g-4" th:unless="${#lists.isEmpty(files)}">
                    <div class="col" th:each="file : ${files}">
                         <div class="card h-100 card-file"
                             th:attr="data-file-id=${file.fileId}, data-file-name=${file.fileName}, data-file-type=${file.extension}, data-file-category=${file.fileType.name()}"
                             onclick="openFileModal(this)">

                            <div class="card-img-top-container">
                                <img th:if="${file.fileType.name() == 'IMAGE' and file.thumbnailUrl != null}"
                                     th:src="${file.thumbnailUrl}" class="card-img-top" th:alt="${file.fileName}"
                                     onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                                
                                <div class="card-icon-display" th:if="${file.fileType.name() != 'IMAGE' or file.thumbnailUrl == null}">
                                    <i th:if="${file.fileType.name() == 'VIDEO'}" class="bi bi-film"></i>
                                    <i th:if="${file.fileType.name() == 'AUDIO'}" class="bi bi-music-note-beamed"></i>
                                    <i th:if="${file.fileType.name() == 'DOCUMENT'}" class="bi bi-file-earmark-text"></i>
                                    <i th:if="${file.fileType.name() == 'IMAGE'}" class="bi bi-image-alt"></i>
                                    <i th:if="${file.fileType.name() == 'OTHER' or file.fileType == null}" class="bi bi-file-earmark-zip"></i>
                                </div>
                                <div th:if="${file.fileType.name() == 'VIDEO'}" class="play-icon-overlay">
                                    <i class="bi bi-play-circle-fill"></i>
                                </div>
                            </div>
                            <div class="card-body">
                                <p class="card-title text-truncate" th:title="${file.fileName}" th:text="${file.fileName}"></p>
                            </div>
                            <div class="card-footer" th:if="${file.fileSize > 0}">
                                <small class="text-muted" th:text="${#numbers.formatDecimal(file.fileSize / 1024.0 / 1024.0, 0, 2)} + ' MB'"></small>
                                <small class="text-muted" th:text="${#temporals.format(file.modifiedTime, 'yy-MM-dd')}"></small>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
        </main>
    </div>

    <!-- Modals -->
    <!-- Image Modal -->
<div class="modal fade" id="imageModal" tabindex="-1"><div class="modal-dialog modal-xl modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5 class="modal-title" id="imageModalTitle"></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body text-center p-0" style="background: #000;"><img id="imageModalImg" src="" class="img-fluid" style="max-height: 90vh;"></div></div></div></div>
<!-- Video Modal -->
<div class="modal fade" id="videoModal" tabindex="-1"><div class="modal-dialog modal-xl modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5 class="modal-title" id="videoModalTitle"></h5><button type="button" class="btn-close" data-bs-dismiss="modal" onclick="stopVideo()"></button></div><div class="modal-body p-0" style="background: #000;"><video id="videoPlayer" controls style="width: 100%; max-height: 90vh;"><source id="videoSource" src="" type=""></video></div></div></div></div>
<!-- Audio Modal -->
<div class="modal fade" id="audioModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5 class="modal-title" id="audioModalTitle"></h5><button type="button" class="btn-close" data-bs-dismiss="modal" onclick="stopAudio()"></button></div><div class="modal-body p-4"><audio id="audioPlayer" controls class="w-100"><source id="audioSource" src="" type=""></audio></div></div></div></div>
<!-- Document Modal -->
<div class="modal fade" id="documentModal" tabindex="-1"><div class="modal-dialog modal-xl modal-dialog-centered"><div class="modal-content" style="height: 95vh;"><div class="modal-header"><h5 class="modal-title" id="documentModalTitle"></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body flex-grow-1" style="overflow-y: auto;"><div id="documentContent" class="h-100"></div></div><div class="modal-footer"><a id="documentDownload" href="#" class="btn btn-primary" download><i class="bi bi-download"></i> 下载</a><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button></div></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let imageModal, videoModal, documentModal, audioModal;

    document.addEventListener('DOMContentLoaded', function () {
        imageModal = new bootstrap.Modal(document.getElementById('imageModal'));
        videoModal = new bootstrap.Modal(document.getElementById('videoModal'));
        documentModal = new bootstrap.Modal(document.getElementById('documentModal'));
        audioModal = new bootstrap.Modal(document.getElementById('audioModal'));
    });

    function openFileModal(element) {
        const category = element.getAttribute('data-file-category');
        const fileId = element.getAttribute('data-file-id');
        const fileName = element.getAttribute('data-file-name');
        const fileType = element.getAttribute('data-file-type');

        if (category === 'IMAGE') {
            openImageModal(fileId, fileName);
        } else if (category === 'VIDEO') {
            openVideoModal(fileId, fileName, fileType);
        } else if (category === 'AUDIO') {
            openAudioModal(fileId, fileName, fileType);
        } else { // DOCUMENT or OTHER
            openDocumentModal(fileId, fileName, fileType);
        }
    }

    function openImageModal(fileId, fileName) {
        document.getElementById('imageModalTitle').textContent = fileName;
        document.getElementById('imageModalImg').src = `/resources/api/file/${fileId}/view`;
        imageModal.show();
    }

    function openVideoModal(fileId, fileName, fileType) {
        document.getElementById('videoModalTitle').textContent = fileName;
        const videoPlayer = document.getElementById('videoPlayer');
        const videoSource = document.getElementById('videoSource');
        videoSource.src = `/resources/api/file/${fileId}/view`;
        videoSource.type = getVideoType(fileType);
        videoPlayer.load();
        videoModal.show();
    }

    function openAudioModal(fileId, fileName, fileType) {
        document.getElementById('audioModalTitle').textContent = fileName;
        const audioPlayer = document.getElementById('audioPlayer');
        const audioSource = document.getElementById('audioSource');
        audioSource.src = `/resources/api/file/${fileId}/view`;
        audioSource.type = getAudioType(fileType);
        audioPlayer.load();
        audioModal.show();
    }

    async function openDocumentModal(fileId, fileName, fileType) {
        document.getElementById('documentModalTitle').textContent = fileName;
        document.getElementById('documentDownload').href = `/resources/api/file/${fileId}/download`;
        
        const docContent = document.getElementById('documentContent');
        const fileExtension = fileType.toLowerCase();

        const officeTypes = ['doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx'];
        const textTypes = ['md', 'txt', 'log', 'csv', 'java', 'js', 'py', 'go', 'rs', 'c', 'cpp', 'h', 'html', 'css', 'json', 'xml', 'yaml'];
        const viewUrl = `/resources/api/file/${fileId}/view`;

        docContent.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary" role="status"></div></div>';
        documentModal.show();

        if (fileExtension === 'pdf') {
            docContent.innerHTML = `<iframe src="${viewUrl}" style="border:0; width:100%; height:100%;"></iframe>`;
        } else if (officeTypes.includes(fileExtension)) {
            try {
                const response = await fetch(`/resources/api/file/${fileId}/direct-url`);
                const data = await response.json();
                if (data.url) {
                    const encodedUrl = encodeURIComponent(data.url);
                    docContent.innerHTML = `<iframe src="https://view.xdocin.com/view?src=${encodedUrl}" style="border:0; width:100%; height:100%;" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>`;
                } else {
                     throw new Error('无法获取文件直链');
                }
            } catch (err) {
                console.error('获取Office文件预览链接失败:', err);
                docContent.innerHTML = `<div class="alert alert-danger">加载预览失败，请稍后重试或直接下载。</div>`;
            }
        } else if (textTypes.includes(fileExtension)) {
            loadTextContent(viewUrl, docContent);
        } else {
            docContent.innerHTML = `<div class="alert alert-light text-center mt-5"><i class="bi bi-exclamation-circle h1"></i><p class="mt-3">该文件类型暂不支持在线预览，请下载后查看。</p></div>`;
        }
    }

    function stopVideo() {
        const videoPlayer = document.getElementById('videoPlayer');
        videoPlayer.pause();
        videoPlayer.src = '';
    }

    function stopAudio() {
        const audioPlayer = document.getElementById('audioPlayer');
        audioPlayer.pause();
        audioPlayer.src = '';
    }

    function getVideoType(ext) {
        const types = {'mp4': 'video/mp4', 'webm': 'video/webm', 'ogg': 'video/ogg'};
        return types[ext.toLowerCase()] || 'video/mp4';
    }

    function getAudioType(ext) {
        const types = {'mp3': 'audio/mpeg', 'wav': 'audio/wav', 'ogg': 'audio/ogg'};
        return types[ext.toLowerCase()] || 'audio/mpeg';
    }

    function loadTextContent(url, container) {
        fetch(url)
            .then(response => response.text())
            .then(text => {
                const escapedText = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                container.innerHTML = `<pre style="white-space: pre-wrap; word-break: break-all; height: 100%;">${escapedText}</pre>`;
            })
            .catch(err => {
                console.error('加载文本失败:', err);
                container.innerHTML = '<div class="alert alert-warning">加载文件内容失败。</div>';
            });
    }
</script>
</body>
</html>
