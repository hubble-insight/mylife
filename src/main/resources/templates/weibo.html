<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微博动态 - MyLife</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
        }

        #sidebar {
            width: 280px;
            background: #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.05);
            transition: all 0.3s;
        }

        #sidebar .sidebar-header {
            padding: 1.5rem;
            text-align: center;
            background: var(--primary-gradient);
            color: #fff;
        }

        #sidebar .sidebar-header h3 {
            margin: 0;
            font-weight: 700;
        }

        #sidebar .list-unstyled {
            padding: 1rem;
        }

        #sidebar .list-unstyled .nav-item {
            margin-bottom: 0.5rem;
        }

        #sidebar .list-unstyled a {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            color: #555;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.3s;
        }

        #sidebar .list-unstyled a:hover {
            background: #f0f2f5;
            color: #667eea;
            text-decoration: none;
        }

        #sidebar .list-unstyled a.active {
            background: var(--primary-gradient);
            color: #fff;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        #sidebar .list-unstyled i {
            margin-right: 0.75rem;
            font-size: 1.2rem;
        }
        
        #sidebar .nav-category {
            padding: 0.5rem 1rem;
            color: #999;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
        }

        #content {
            flex-grow: 1;
            padding: 2rem;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-header">
            <h3><i class="bi bi-house-heart-fill"></i> MyLife</h3>
        </div>
        <ul class="list-unstyled components">
             <li class="nav-item">
                <a class="nav-link" th:href="@{/home}">
                    <i class="bi bi-speedometer2"></i> 首页
                </a>
            </li>
            <li class="nav-category">个人动态</li>
            <li class="nav-item">
                <a class="nav-link active" th:href="@{/weibo}">
                    <i class="bi bi-weibo"></i> 微博动态
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/github}">
                    <i class="bi bi-github"></i> GitHub
                </a>
            </li>
            <li class="nav-category">个人数据</li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/resources}">
                    <i class="bi bi-cloud"></i> 资源库
                </a>
            </li>
        </ul>
    </div>

    <div id="content">
        <main class="container-fluid">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="bi bi-weibo"></i> 微博动态</h2>
                <div>
                    <a th:href="@{/weibo(sync=true)}" class="btn btn-primary">
                        <i class="bi bi-sync"></i> 同步最新微博
                    </a>
                </div>
            </div>

            <div class="row">
                <div class="col-lg-8 mx-auto">
                    <div th:if="${#lists.isEmpty(posts)}" class="text-center py-5">
                        <i class="bi bi-inbox display-1 text-muted"></i>
                        <h4 class="mt-3 text-muted">暂无微博数据</h4>
                        <p class="text-muted">请点击上方按钮同步微博数据</p>
                    </div>

                    <div th:unless="${#lists.isEmpty(posts)}">
                        <div th:each="post : ${posts}" class="card mb-3 weibo-card">
                            <div class="card-body">
                                <p class="card-text" th:text="${post.content}"></p>

                                <img th:if="${post.originalUrl}" th:src="${post.originalUrl}" class="img-fluid rounded mt-2" alt="weibo image" style="max-height: 300px;">

                                <div class="d-flex justify-content-between align-items-center mt-3">
                                    <small class="text-muted">
                                        <i class="bi bi-clock"></i>
                                        <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                                        <span class="ms-2" th:if="${post.source}" th:text="'来自 ' + ${post.source}"></span>
                                    </small>
                                    <div class="weibo-stats">
                                        <span class="me-3 text-muted">
                                            <i class="bi bi-arrow-repeat"></i> <span th:text="${post.repostsCount}">0</span>
                                        </span>
                                        <span class="me-3 text-muted">
                                            <i class="bi bi-chat"></i> <span th:text="${post.commentsCount}">0</span>
                                        </span>
                                        <span class="text-muted">
                                            <i class="bi bi-hand-thumbs-up"></i> <span th:text="${post.attitudesCount}">0</span>
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
