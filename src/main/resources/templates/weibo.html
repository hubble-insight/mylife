<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微博动态 - MyLife</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" th:href="@{/home}">
                <i class="bi bi-house-heart"></i> MyLife
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/home}">
                            <i class="bi bi-speedometer2"></i> 首页
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/weibo}">
                            <i class="bi bi-weibo"></i> 动态
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/resources}">
                            <i class="bi bi-cloud"></i> 资源库
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/oauth/baidu/status}">
                            <i class="bi bi-shield-lock"></i> 授权管理
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container my-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-weibo"></i> 微博动态</h2>
            <div>
                <a th:href="@{/weibo(sync=true)}" class="btn btn-primary">
                    <i class="bi bi-sync"></i> 同步最新微博
                </a>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8 mx-auto">
                <div th:if="${#lists.isEmpty(posts)}" class="text-center py-5">
                    <i class="bi bi-inbox display-1 text-muted"></i>
                    <h4 class="mt-3 text-muted">暂无微博数据</h4>
                    <p class="text-muted">请点击上方按钮同步微博数据</p>
                </div>

                <div th:unless="${#lists.isEmpty(posts)}">
                    <div th:each="post : ${posts}" class="card mb-3 weibo-card">
                        <div class="card-body">
                            <p class="card-text" th:text="${post.content}"></p>

                            <img th:if="${post.originalUrl}" th:src="${post.originalUrl}" class="img-fluid rounded mt-2" alt="weibo image" style="max-height: 300px;">

                            <div class="d-flex justify-content-between align-items-center mt-3">
                                <small class="text-muted">
                                    <i class="bi bi-clock"></i>
                                    <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                                    <span class="ms-2" th:if="${post.source}" th:text="'来自 ' + ${post.source}"></span>
                                </small>
                                <div class="weibo-stats">
                                    <span class="me-3 text-muted">
                                        <i class="bi bi-arrow-repeat"></i> <span th:text="${post.repostsCount}">0</span>
                                    </span>
                                    <span class="me-3 text-muted">
                                        <i class="bi bi-chat"></i> <span th:text="${post.commentsCount}">0</span>
                                    </span>
                                    <span class="text-muted">
                                        <i class="bi bi-hand-thumbs-up"></i> <span th:text="${post.attitudesCount}">0</span>
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-light py-4 mt-4">
        <div class="container text-center">
            <p class="mb-0 text-muted">&copy; 2026 MyLife - 个人生活记录</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
