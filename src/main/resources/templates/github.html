<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub动态 - MyLife</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
        }

        #sidebar {
            width: 280px;
            background: #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.05);
        }

        #sidebar .sidebar-header {
            padding: 1.5rem;
            text-align: center;
            background: var(--primary-gradient);
            color: #fff;
        }

        #sidebar .sidebar-header h3 {
            margin: 0;
            font-weight: 700;
        }

        #sidebar .list-unstyled {
            padding: 1rem;
        }

        #sidebar .list-unstyled .nav-item {
            margin-bottom: 0.5rem;
        }

        #sidebar .list-unstyled a {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            color: #555;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.3s;
        }

        #sidebar .list-unstyled a:hover {
            background: #f0f2f5;
            color: #667eea;
            text-decoration: none;
        }

        #sidebar .list-unstyled a.active {
            background: var(--primary-gradient);
            color: #fff;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        #sidebar .list-unstyled i {
            margin-right: 0.75rem;
            font-size: 1.2rem;
        }
        
        #sidebar .nav-category {
            padding: 0.5rem 1rem;
            color: #999;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
        }

        #content {
            flex-grow: 1;
            padding: 2rem;
            overflow-y: auto;
        }
        
        .github-item {
            border: 1px solid #e9ecef;
            border-radius: .75rem;
            transition: all 0.3s ease;
        }
        
        .github-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.08);
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-header">
            <h3><i class="bi bi-house-heart-fill"></i> MyLife</h3>
        </div>
        <ul class="list-unstyled components">
             <li class="nav-item">
                <a class="nav-link" th:href="@{/home}">
                    <i class="bi bi-speedometer2"></i> 首页
                </a>
            </li>
            <li class="nav-category">个人动态</li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/weibo}">
                    <i class="bi bi-weibo"></i> 微博动态
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" th:href="@{/github}">
                    <i class="bi bi-github"></i> GitHub
                </a>
            </li>
            <li class="nav-category">个人数据</li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/resources}">
                    <i class="bi bi-cloud"></i> 资源库
                </a>
            </li>
        </ul>
    </div>

    <div id="content">
        <main class="container-fluid">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="bi bi-github"></i> GitHub 动态</h2>
                <div>
                    <a th:href="@{/github/sync}" class="btn btn-dark">
                        <i class="bi bi-sync"></i> 同步 GitHub 动态
                    </a>
                </div>
            </div>

            <div class="row">
                <div class="col-lg-10 mx-auto">
                    <div th:if="${#lists.isEmpty(activities)}" class="text-center py-5">
                        <i class="bi bi-inbox display-1 text-muted"></i>
                        <h4 class="mt-3 text-muted">暂无 GitHub 动态</h4>
                        <p class="text-muted">请点击上方按钮同步 GitHub 动态</p>
                    </div>

                    <div th:unless="${#lists.isEmpty(activities)}" class="list-group">
                       <a th:each="activity : ${activities}" th:href="${activity.link}" target="_blank" class="list-group-item list-group-item-action github-item mb-2">
                           <div class="d-flex w-100 justify-content-between">
                               <h5 class="mb-1" th:text="${activity.title}"></h5>
                               <small th:text="${#temporals.format(activity.publishedAt, 'yyyy-MM-dd HH:mm')}"></small>
                           </div>
                           <div class="mb-1" th:utext="${activity.content}"></div>
                       </a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
