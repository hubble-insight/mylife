<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLife - 个人生活记录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --warning-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --info-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --dark-gradient: linear-gradient(135deg, #434343 0%, #000000 100%);
            --secondary-gradient: linear-gradient(135deg, #868f96 0%, #596164 100%);
        }

        body {
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
        }

        #sidebar {
            width: 280px;
            background: #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.05);
            transition: all 0.3s;
        }

        #sidebar .sidebar-header {
            padding: 1.5rem;
            text-align: center;
            background: var(--primary-gradient);
            color: #fff;
        }

        #sidebar .sidebar-header h3 {
            margin: 0;
            font-weight: 700;
        }

        #sidebar .list-unstyled {
            padding: 1rem;
        }

        #sidebar .list-unstyled .nav-item {
            margin-bottom: 0.5rem;
        }

        #sidebar .list-unstyled a {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            color: #555;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.3s;
        }

        #sidebar .list-unstyled a:hover {
            background: #f0f2f5;
            color: #667eea;
            text-decoration: none;
        }

        #sidebar .list-unstyled a.active {
            background: var(--primary-gradient);
            color: #fff;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        #sidebar .list-unstyled i {
            margin-right: 0.75rem;
            font-size: 1.2rem;
        }
        
        #sidebar .nav-category {
            padding: 0.5rem 1rem;
            color: #999;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
        }

        #content {
            flex-grow: 1;
            padding: 2rem;
            overflow-y: auto;
        }
        
        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--primary-gradient);
            border-radius: 2px;
        }

        .stats-card {
            border: none;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
        }

        .stats-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            pointer-events: none;
        }

        .stats-card:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .stats-card .card-body {
            padding: 1.5rem;
        }

        .stats-card h6 {
            font-size: 0.85rem;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stats-card h2 {
            font-size: 2.5rem;
            font-weight: 800;
        }

        .card {
            border: none;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
        }

        .card:hover {
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            transform: translateY(-4px);
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-header">
            <h3><i class="bi bi-house-heart-fill"></i> MyLife</h3>
        </div>
        <ul class="list-unstyled components">
             <li class="nav-item">
                <a class="nav-link active" th:href="@{/home}">
                    <i class="bi bi-speedometer2"></i> 首页
                </a>
            </li>
            <li class="nav-category">个人动态</li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/weibo}">
                    <i class="bi bi-weibo"></i> 微博动态
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/github}">
                    <i class="bi bi-github"></i> GitHub
                </a>
            </li>
            <li class="nav-category">个人数据</li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/resources}">
                    <i class="bi bi-cloud"></i> 资源库
                </a>
            </li>
        </ul>
    </div>

    <div id="content">
        <main class="container-fluid">
             <div class="row mb-4">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h1 class="display-6 fw-bold mb-1" style="background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                            欢迎回来
                        </h1>
                        <p class="text-muted mb-0">
                            <i class="bi bi-calendar3"></i>
                            <span th:text="${#temporals.format(#temporals.createNow(), 'EEEE, yyyy 年 MM 月 dd 日')}"></span>
                        </p>
                    </div>
                    <div class="d-flex gap-2">
                        <a th:href="@{/weibo(sync=true)}" class="btn btn-outline-primary btn-sm">
                            <i class="bi bi-arrow-repeat"></i> 同步微博
                        </a>
                        <a th:href="@{/resources(sync=true)}" class="btn btn-outline-success btn-sm">
                            <i class="bi bi-cloud-arrow-up"></i> 同步资源
                        </a>
                        <a th:href="@{/github/sync}" class="btn btn-outline-dark btn-sm">
                            <i class="bi bi-git"></i> 同步 GitHub
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Statistics Section -->
        <section class="mb-5">
            <h2 class="section-title">数据概览</h2>
            <div class="row g-3">
                <div class="col-6 col-md-2">
                    <div class="stats-card" style="background: var(--primary-gradient);">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="card-subtitle mb-2">微博动态</h6>
                                    <h2 class="mb-0" th:text="${stats.weiboCount}">0</h2>
                                </div>
                                <i class="bi bi-weibo display-4" style="opacity: 0.3;"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-2">
                    <div class="stats-card" style="background: var(--success-gradient);">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="card-subtitle mb-2">文档</h6>
                                    <h2 class="mb-0" th:text="${stats.documentCount}">0</h2>
                                </div>
                                <i class="bi bi-file-earmark-text display-4" style="opacity: 0.3;"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-2">
                    <div class="stats-card" style="background: var(--warning-gradient);">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="card-subtitle mb-2">视频</h6>
                                    <h2 class="mb-0" th:text="${stats.videoCount}">0</h2>
                                </div>
                                <i class="bi bi-camera-video display-4" style="opacity: 0.3;"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-2">
                    <div class="stats-card" style="background: var(--info-gradient);">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="card-subtitle mb-2">音频</h6>
                                    <h2 class="mb-0" th:text="${stats.audioCount}">0</h2>
                                </div>
                                <i class="bi bi-music-note-beamed display-4" style="opacity: 0.3;"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-2">
                    <div class="stats-card" style="background: var(--dark-gradient);">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="card-subtitle mb-2">GitHub</h6>
                                    <h2 class="mb-0" th:text="${stats.githubCount}">0</h2>
                                </div>
                                <i class="bi bi-github display-4" style="opacity: 0.3;"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-2">
                    <div class="stats-card" style="background: var(--secondary-gradient);">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="card-subtitle mb-2">总文件</h6>
                                    <h2 class="mb-0" th:text="${stats.totalFiles}">0</h2>
                                </div>
                                <i class="bi bi-files display-4" style="opacity: 0.3;"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
