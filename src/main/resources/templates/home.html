<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLife - 个人生活记录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" th:href="@{/home}">
                <i class="bi bi-house-heart"></i> MyLife
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/home}">
                            <i class="bi bi-speedometer2"></i> 首页
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/weibo}">
                            <i class="bi bi-weibo"></i> 动态
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/resources}">
                            <i class="bi bi-cloud"></i> 资源库
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/oauth/baidu/status}">
                            <i class="bi bi-shield-lock"></i> 授权管理
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container my-4">
        <!-- Statistics Cards -->
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="card stats-card bg-primary text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-subtitle mb-2">微博动态</h6>
                                <h2 class="mb-0" th:text="${stats.weiboCount}">0</h2>
                            </div>
                            <i class="bi bi-weibo display-4"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stats-card bg-success text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-subtitle mb-2">文档</h6>
                                <h2 class="mb-0" th:text="${stats.documentCount}">0</h2>
                            </div>
                            <i class="bi bi-file-earmark-text display-4"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stats-card bg-warning text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-subtitle mb-2">视频</h6>
                                <h2 class="mb-0" th:text="${stats.videoCount}">0</h2>
                            </div>
                            <i class="bi bi-camera-video display-4"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stats-card bg-info text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-subtitle mb-2">音频</h6>
                                <h2 class="mb-0" th:text="${stats.audioCount}">0</h2>
                            </div>
                            <i class="bi bi-music-note-beamed display-4"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- Latest Weibo Posts -->
            <div class="col-lg-6">
                <div class="card mb-4">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="bi bi-weibo"></i> 最新微博</h5>
                        <a th:href="@{/weibo}" class="btn btn-sm btn-outline-primary">查看更多</a>
                    </div>
                    <div class="card-body">
                        <div th:if="${#lists.isEmpty(latestWeibos)}" class="text-muted text-center py-4">
                            <i class="bi bi-inbox display-4"></i>
                            <p class="mt-2">暂无微博数据</p>
                            <a th:href="@{/weibo(sync=true)}" class="btn btn-primary btn-sm mt-2">
                                <i class="bi bi-sync"></i> 同步微博
                            </a>
                        </div>
                        <div th:unless="${#lists.isEmpty(latestWeibos)}">
                            <div th:each="post : ${latestWeibos}" class="weibo-item border-bottom pb-3 mb-3">
                                <p class="mb-2" th:text="${post.content}"></p>
                                <div class="d-flex justify-content-between align-items-center">
                                    <small class="text-muted">
                                        <i class="bi bi-clock"></i>
                                        <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                                    </small>
                                    <div class="weibo-stats">
                                        <span class="me-2"><i class="bi bi-arrow-repeat"></i> <span th:text="${post.repostsCount}">0</span></span>
                                        <span class="me-2"><i class="bi bi-chat"></i> <span th:text="${post.commentsCount}">0</span></span>
                                        <span><i class="bi bi-hand-thumbs-up"></i> <span th:text="${post.attitudesCount}">0</span></span>
                                    </div>
                                </div>
                                <img th:if="${post.thumbnailUrl}" th:src="${post.thumbnailUrl}" class="img-thumbnail mt-2" style="max-height: 100px;" alt="weibo image">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Latest Files -->
            <div class="col-lg-6">
                <div class="card mb-4">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="bi bi-cloud"></i> 最新资源</h5>
                        <a th:href="@{/resources}" class="btn btn-sm btn-outline-primary">查看更多</a>
                    </div>
                    <div class="card-body">
                        <div th:if="${#lists.isEmpty(latestFiles)}" class="text-muted text-center py-4">
                            <i class="bi bi-inbox display-4"></i>
                            <p class="mt-2">暂无资源数据</p>
                            <a th:href="@{/resources(sync=true)}" class="btn btn-primary btn-sm mt-2">
                                <i class="bi bi-sync"></i> 同步资源
                            </a>
                        </div>
                        <div th:unless="${#lists.isEmpty(latestFiles)}">
                            <div th:each="file : ${latestFiles}" class="file-item d-flex align-items-center py-2 border-bottom">
                                <div class="file-icon me-3">
                                    <i th:if="${file.fileType.name() == 'DOCUMENT'}" class="bi bi-file-earmark-text text-success fs-4"></i>
                                    <i th:if="${file.fileType.name() == 'VIDEO'}" class="bi bi-camera-video text-warning fs-4"></i>
                                    <i th:if="${file.fileType.name() == 'AUDIO'}" class="bi bi-music-note text-info fs-4"></i>
                                    <i th:if="${file.fileType.name() == 'IMAGE'}" class="bi bi-image text-primary fs-4"></i>
                                    <i th:if="${file.fileType.name() == 'OTHER' || file.fileType == null}" class="bi bi-file-earmark text-secondary fs-4"></i>
                                </div>
                                <div class="flex-grow-1">
                                    <h6 class="mb-1 text-truncate" th:text="${file.fileName}" style="max-width: 300px;"></h6>
                                    <small class="text-muted">
                                        <span th:text="${#temporals.format(file.modifiedTime, 'yyyy-MM-dd')}"></span>
                                        <span th:if="${file.fileSize > 0}" class="ms-2" th:text="${#numbers.formatDecimal(file.fileSize / 1024.0 / 1024.0, 0, 2)} + ' MB'"></span>
                                    </small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-light py-4 mt-4">
        <div class="container text-center">
            <p class="mb-0 text-muted">&copy; 2026 MyLife - 个人生活记录</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
