<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLife - 个人生活记录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4a89dc;
            --primary-gradient: linear-gradient(135deg, #4a89dc 0%, #3e74c8 100%);
        }

        body {
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
        }

        #sidebar {
            width: 280px;
            background: #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.05);
        }

        #sidebar .sidebar-header {
            padding: 1.5rem;
            text-align: center;
            background: var(--primary-gradient);
            color: #fff;
        }

        #sidebar .sidebar-header h3 {
            margin: 0;
            font-weight: 700;
        }

        #sidebar .list-unstyled {
            padding: 1rem;
        }

        #sidebar .list-unstyled .nav-item {
            margin-bottom: 0.5rem;
        }

        #sidebar .list-unstyled a {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            color: #555;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.3s;
        }

        #sidebar .list-unstyled a:hover {
            background: #f0f2f5;
            color: var(--primary-color);
            text-decoration: none;
        }

        #sidebar .list-unstyled a.active {
            background: var(--primary-gradient);
            color: #fff;
            box-shadow: 0 4px 15px rgba(74, 137, 220, 0.4);
        }

        #sidebar .list-unstyled i {
            margin-right: 0.75rem;
            font-size: 1.2rem;
        }
        
        #sidebar .nav-category {
            padding: 0.5rem 1rem;
            color: #999;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
        }

        #content {
            flex-grow: 1;
            padding: 2rem;
            overflow-y: auto;
        }
        
        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--primary-gradient);
            border-radius: 2px;
        }

        .stats-card {
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .stats-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
        }

        .stats-card .card-body {
            padding: 1.5rem;
        }

        .stats-card .card-title {
            font-size: 0.9rem;
            font-weight: 500;
            color: #6c757d;
        }

        .stats-card .card-text {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .stats-card .card-icon {
            font-size: 2.5rem;
            color: var(--primary-color);
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-header">
            <h3><i class="bi bi-house-heart-fill"></i> MyLife</h3>
        </div>
        <ul class="list-unstyled components">
             <li class="nav-item">
                <a class="nav-link active" th:href="@{/home}">
                    <i class="bi bi-speedometer2"></i> 首页
                </a>
            </li>
            <li class="nav-category">个人动态</li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/weibo}">
                    <i class="bi bi-weibo"></i> 微博动态
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/github}">
                    <i class="bi bi-github"></i> GitHub
                </a>
            </li>
            <li class="nav-category">个人数据</li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/resources}">
                    <i class="bi bi-cloud"></i> 资源库
                </a>
            </li>
        </ul>
    </div>

    <div id="content">
        <main class="container-fluid">
             <div class="row mb-4">
                <div class="col-12">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h1 class="display-6 fw-bold mb-1" style="color: var(--primary-color)">
                                欢迎回来
                            </h1>
                            <p class="text-muted mb-0">
                                <i class="bi bi-calendar3"></i>
                                <span th:text="${#temporals.format(#temporals.createNow(), 'EEEE, yyyy 年 MM 月 dd 日')}"></span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Statistics Section -->
            <div class="row">
                <div class="col-lg-6">
                    <section class="mb-5">
                        <h2 class="section-title">个人动态</h2>
                        <div class="row g-4">
                            <div class="col-6">
                                <div class="card stats-card">
                                    <div class="card-body d-flex justify-content-between align-items-center">
                                        <div>
                                            <h6 class="card-title mb-1">微博动态</h6>
                                            <p class="card-text mb-0" th:text="${stats.weiboCount}">0</p>
                                        </div>
                                        <i class="bi bi-weibo card-icon"></i>
                                    </div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="card stats-card">
                                    <div class="card-body d-flex justify-content-between align-items-center">
                                        <div>
                                            <h6 class="card-title mb-1">GitHub</h6>
                                            <p class="card-text mb-0" th:text="${stats.githubCount}">0</p>
                                        </div>
                                        <i class="bi bi-github card-icon"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
                <div class="col-lg-6">
                    <section class="mb-5">
                        <h2 class="section-title">个人数据</h2>
                        <div class="row g-4">
                             <div class="col-6">
                                <div class="card stats-card">
                                    <div class="card-body d-flex justify-content-between align-items-center">
                                        <div>
                                            <h6 class="card-title mb-1">总文件</h6>
                                            <p class="card-text mb-0" th:text="${stats.totalFiles}">0</p>
                                        </div>
                                        <i class="bi bi-files card-icon"></i>
                                    </div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="card stats-card">
                                    <div class="card-body d-flex justify-content-between align-items-center">
                                        <div>
                                            <h6 class="card-title mb-1">文档</h6>
                                            <p class="card-text mb-0" th:text="${stats.documentCount}">0</p>
                                        </div>
                                        <i class="bi bi-file-earmark-text card-icon"></i>
                                    </div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="card stats-card">
                                    <div class="card-body d-flex justify-content-between align-items-center">
                                        <div>
                                            <h6 class="card-title mb-1">视频</h6>
                                            <p class="card-text mb-0" th:text="${stats.videoCount}">0</p>
                                        </div>
                                        <i class="bi bi-camera-video card-icon"></i>
                                    </div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="card stats-card">
                                    <div class="card-body d-flex justify-content-between align-items-center">
                                        <div>
                                            <h6 class="card-title mb-1">音频</h6>
                                            <p class="card-text mb-0" th:text="${stats.audioCount}">0</p>
                                        </div>
                                        <i class="bi bi-music-note-beamed card-icon"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
